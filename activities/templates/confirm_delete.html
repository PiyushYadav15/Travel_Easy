{% extends 'main.html' %}
{% block content %}
<h2>Confirm Delete</h2>
<p>Are you sure you want to delete "{{ object.name }}"?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, Delete</button>
  <a href="{% url 'activity_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}

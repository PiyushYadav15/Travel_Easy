{% extends 'main.html' %}
{% block content %}
<h2>Restore Activity</h2>

<p>Are you sure you want to restore <strong>{{ object.name }}</strong>?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-success">Yes, Restore</button>
  <a href="{% url 'activity_history' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}

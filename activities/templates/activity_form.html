{% extends 'main.html' %}
{% block content %}
<h2>{% if form.instance.pk %}Update{% else %}Create{% endif %} Activity</h2>


<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-success">Save</button>
  <a href="{% url 'activity_list' %}" class="btn btn-secondary">Cancel</a>
</form>

<a href="{% url 'activity_list' %}" class="btn btn-secondary mt-2">Back</a>
{% endblock %}

<style>
/* Profile Page Styles */
.profile-container {
    max-width: 700px;
    margin: 2rem auto;
    padding: 1rem;
    animation: fadeInUp 0.8s ease-out;
}

/* Profile Card */
.profile-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 3rem 2.5rem;
    border-radius: 30px;
    box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
}

/* Animated Gradient Border */
.profile-card::before {
    content: '';
    position: absolute;
    inset: -3px;
    background: conic-gradient(
        from 0deg,
        #667eea,
        #764ba2,
        #ff6b6b,
        #ffd93d,
        #6bcb77,
        #667eea
    );
    border-radius: 32px;
    z-index: -1;
    animation: rotateBorder 8s linear infinite;
    opacity: 0.8;
}

.profile-card::after {
    content: '';
    position: absolute;
    inset: 2px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 28px;
    z-index: -1;
}

/* Floating Particles */
.profile-card .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.08;
    animation: floatParticle 10s ease-in-out infinite;
    z-index: 0;
}

.profile-card .particle:nth-child(1) {
    width: 120px;
    height: 120px;
    background: #667eea;
    top: -40px;
    right: -40px;
    animation-delay: 0s;
}

.profile-card .particle:nth-child(2) {
    width: 80px;
    height: 80px;
    background: #ff6b6b;
    bottom: -30px;
    left: -30px;
    animation-delay: 2s;
}

.profile-card .particle:nth-child(3) {
    width: 60px;
    height: 60px;
    background: #ffd93d;
    top: 40%;
    left: -20px;
    animation-delay: 4s;
}

.profile-card .particle:nth-child(4) {
    width: 50px;
    height: 50px;
    background: #6bcb77;
    bottom: 40%;
    right: -15px;
    animation-delay: 3s;
}

/* Profile Icon */
.profile-icon {
    font-size: 5rem;
    margin-bottom: 1rem;
    display: inline-block;
    position: relative;
    z-index: 1;
    animation: float 3s ease-in-out infinite;
}

.profile-icon::after {
    content: '';
    position: absolute;
    inset: -10px;
    background: radial-gradient(circle, rgba(102, 126, 234, 0.1), transparent 70%);
    border-radius: 50%;
    z-index: -1;
    animation: pulseGlow 2s ease-in-out infinite;
}

/* Welcome Text */
.profile-card h2 {
    font-size: 2.5rem;
    font-weight: 800;
    color: #2d3436;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.profile-card h2::after {
    content: '✨';
    font-size: 1.8rem;
    margin-left: 0.5rem;
    animation: sparkle 2s ease-in-out infinite;
    -webkit-text-fill-color: initial;
}

/* Profile Info Grid */
.profile-info {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 0.8rem;
    text-align: left;
    margin: 2rem 0 2.5rem;
    padding: 1.5rem;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
    border-radius: 20px;
    position: relative;
    z-index: 1;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.profile-info p {
    font-weight: 700;
    color: #2d3436;
    margin: 0;
    padding: 0.6rem 0;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

.profile-info p:last-of-type {
    border-bottom: none;
}

.profile-info p::before {
    font-size: 1.2rem;
}

.profile-info p:first-of-type::before {
    content: '👤';
}

.profile-info p:last-of-type::before {
    content: '📧';
}

.profile-info span {
    color: #555;
    padding: 0.6rem 0;
    font-size: 0.95rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    word-break: break-all;
}

.profile-info span:last-of-type {
    border-bottom: none;
}

/* Profile Info Hover Effect */
.profile-info p:hover,
.profile-info span:hover {
    background: rgba(102, 126, 234, 0.05);
    border-radius: 5px;
    padding-left: 0.5rem;
    transition: all 0.3s ease;
}

/* Profile Buttons */
.profile-buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
    margin-top: 0.5rem;
}

.btn {
    padding: 0.8rem 2rem;
    border: none;
    border-radius: 50px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    position: relative;
    overflow: hidden;
    min-width: 160px;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

/* Shimmer Effect for all buttons */
.btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    transition: left 0.6s ease;
}

.btn:hover::before {
    left: 100%;
}

/* Primary Button - Update Profile */
.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
}

.btn-primary::before {
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
}

.btn-primary:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 35px rgba(102, 126, 234, 0.6);
    background: linear-gradient(135deg, #7c6cf0, #8b5cf6);
}

.btn-primary:active {
    transform: scale(0.95);
}

/* Warning Button - Change Password */
.btn-warning {
    background: linear-gradient(135deg, #ffd93d, #f7971e);
    color: #333;
    box-shadow: 0 4px 15px rgba(255, 217, 61, 0.4);
}

.btn-warning::before {
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
}

.btn-warning:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 30px rgba(255, 217, 61, 0.6);
    background: linear-gradient(135deg, #ffe44d, #f7971e);
}

.btn-warning:active {
    transform: scale(0.95);
}

/* Danger Button - Logout */
.btn-danger {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
}

.btn-danger::before {
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
}

.btn-danger:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
    background: linear-gradient(135deg, #ff5252, #d63031);
}

.btn-danger:active {
    transform: scale(0.95);
}

/* Button Icon Animations */
.btn .btn-icon {
    display: inline-block;
    transition: transform 0.3s ease;
}

.btn:hover .btn-icon {
    transform: scale(1.2);
}

.btn-primary:hover .btn-icon {
    transform: rotate(-10deg) scale(1.2);
}

.btn-warning:hover .btn-icon {
    transform: rotate(15deg) scale(1.2);
}

.btn-danger:hover .btn-icon {
    transform: translateX(5px) scale(1.2);
}

/* Animations */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes rotateBorder {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-15px);
    }
}

@keyframes floatParticle {
    0%, 100% {
        transform: translate(0, 0) scale(1);
    }
    25% {
        transform: translate(50px, -40px) scale(1.2);
    }
    50% {
        transform: translate(-40px, 50px) scale(0.9);
    }
    75% {
        transform: translate(40px, -50px) scale(1.1);
    }
}

@keyframes sparkle {
    0%, 100% {
        transform: scale(1) rotate(0deg);
    }
    25% {
        transform: scale(1.2) rotate(20deg);
    }
    75% {
        transform: scale(1.2) rotate(-20deg);
    }
}

@keyframes pulseGlow {
    0%, 100% {
        transform: scale(1);
        opacity: 0.5;
    }
    50% {
        transform: scale(1.3);
        opacity: 1;
    }
}

/* Container Hover Effect */
.profile-card:hover {
    transform: translateY(-5px);
    box-shadow: 
        0 25px 70px rgba(0, 0, 0, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.2) inset;
}

/* Responsive Design */
@media (max-width: 768px) {
    .profile-container {
        margin: 1rem;
        padding: 0.5rem;
    }
    
    .profile-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
    }
    
    .profile-card h2 {
        font-size: 2rem;
    }
    
    .profile-icon {
        font-size: 4rem;
    }
    
    .profile-info {
        grid-template-columns: 1fr;
        gap: 0.3rem;
        padding: 1rem;
        text-align: center;
    }
    
    .profile-info p {
        justify-content: center;
        border-bottom: none;
        padding: 0.3rem 0;
    }
    
    .profile-info span {
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        padding: 0.3rem 0;
        margin-bottom: 0.5rem;
    }
    
    .profile-info span:last-of-type {
        border-bottom: none;
        margin-bottom: 0;
    }
    
    .profile-buttons {
        flex-direction: column;
        align-items: stretch;
        gap: 0.8rem;
    }
    
    .btn {
        padding: 0.7rem 1.5rem;
        font-size: 0.9rem;
        min-width: 120px;
        width: 100%;
    }
}

@media (max-width: 480px) {
    .profile-container {
        margin: 0.5rem;
        padding: 0.3rem;
    }
    
    .profile-card {
        padding: 1.5rem 1rem;
        border-radius: 15px;
    }
    
    .profile-card::before {
        border-radius: 17px;
    }
    
    .profile-card::after {
        border-radius: 13px;
    }
    
    .profile-card h2 {
        font-size: 1.6rem;
    }
    
    .profile-card h2::after {
        font-size: 1.2rem;
    }
    
    .profile-icon {
        font-size: 3.5rem;
    }
    
    .profile-info {
        padding: 0.8rem;
        margin: 1.5rem 0;
    }
    
    .profile-info p {
        font-size: 0.85rem;
    }
    
    .profile-info span {
        font-size: 0.85rem;
    }
    
    .btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.85rem;
        min-width: 100px;
    }
}

/* Dark Mode Support */
@media (prefers-color-scheme: dark) {
    .profile-card {
        background: rgba(30, 30, 40, 0.95);
    }
    
    .profile-card::after {
        background: rgba(30, 30, 40, 0.95);
    }
    
    .profile-card h2 {
        background: linear-gradient(135deg, #a29bfe, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    .profile-info {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        border-color: rgba(255, 255, 255, 0.05);
    }
    
    .profile-info p {
        color: #ddd;
        border-bottom-color: rgba(255, 255, 255, 0.05);
    }
    
    .profile-info span {
        color: #bbb;
        border-bottom-color: rgba(255, 255, 255, 0.05);
    }
    
    .profile-info p:hover,
    .profile-info span:hover {
        background: rgba(102, 126, 234, 0.1);
    }
}

/* Print Styles */
@media print {
    .profile-card {
        box-shadow: none;
        border: 1px solid #ddd;
    }
    
    .profile-buttons {
        display: none;
    }
}

/* Additional Effects */

/* Member Since Badge (Optional) */
.member-since {
    display: inline-block;
    padding: 0.3rem 1rem;
    background: rgba(102, 126, 234, 0.1);
    border-radius: 20px;
    font-size: 0.85rem;
    color: #667eea;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
}

/* Profile Status Indicator */
.status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 1rem;
    background: rgba(107, 203, 119, 0.1);
    border-radius: 20px;
    font-size: 0.85rem;
    color: #2d9b4e;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
}

.status-indicator::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #2d9b4e;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% {
        opacity: 1;
        transform: scale(1);
    }
    50% {
        opacity: 0.5;
        transform: scale(0.8);
    }
}

/* Focus States for Accessibility */
.btn:focus {
    outline: 3px solid rgba(102, 126, 234, 0.5);
    outline-offset: 3px;
}

/* Hover Scale for Profile Info */
.profile-info p,
.profile-info span {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Loading Skeleton (Optional) */
.skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
}

@keyframes shimmer {
    0% {
        background-position: -200% 0;
    }
    100% {
        background-position: 200% 0;
    }
}

/* Toast Notification */
.toast-notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 1rem 2rem;
    border-radius: 15px;
    color: white;
    font-weight: 600;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    animation: slideInRight 0.5s ease-out;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 0.8rem;
}

.toast-notification.success {
    background: linear-gradient(135deg, #6bcb77, #2d9b4e);
}

.toast-notification.error {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
}

.toast-notification.hide {
    animation: slideOutRight 0.5s ease-out forwards;
}

@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOutRight {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(100%);
        opacity: 0;
    }
}



</style>





{% extends 'main.html' %}

{% block content %}

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-icon">
            👤
        </div>

        <h2>Welcome, {{ user.username }}</h2>

        <div class="profile-info">

            <p><strong>Username</strong></p>
            <span>{{ user.username }}</span>

            <p><strong>Email</strong></p>
            <span>{{ user.email }}</span>

        </div>

        <div class="profile-buttons">

            <a href="{% url 'update_profile' %}" class="btn btn-primary">
                ✏️ Update Profile
            </a>

            <a href="{% url 'update_password' %}" class="btn btn-warning">
                🔒 Change Password
            </a>

            <a href="{% url 'signout' %}" class="btn btn-danger">
                🚪 Logout
            </a>

        </div>

    </div>

</div>

{% endblock %}

{% extends 'main.html' %}
{% block content %}
<h2 class="mb-4">Login Page</h2>

<form method="POST" class="card p-4 shadow-sm">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-success">Login</button>
</form>
<p class="mt-3">Don't have an account? <a href="{% url 'signup' %}">Register here</a></p>
{% endblock %}

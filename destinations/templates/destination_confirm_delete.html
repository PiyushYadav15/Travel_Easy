<style>
   /* Delete Confirmation Page Styles */
.delete-container {
    max-width: 500px;
    margin: 3rem auto;
    padding: 2.5rem;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    text-align: center;
    animation: fadeInUp 0.6s ease-out;
    position: relative;
    overflow: hidden;
}

/* Animated background gradient */
.delete-container::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255, 100, 100, 0.05) 25%,
        transparent 50%,
        rgba(255, 100, 100, 0.05) 75%,
        transparent 100%
    );
    animation: rotate 20s linear infinite;
    z-index: 0;
}

.delete-container > * {
    position: relative;
    z-index: 1;
}

/* Heading */
.delete-container h2 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shake 0.8s ease-in-out;
}

/* Warning Icon Pulse */
.delete-container h2 {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.delete-container h2::before {
    content: '⚠️';
    font-size: 2.8rem;
    animation: pulse 1.5s ease-in-out infinite;
}

/* Confirmation Text */
.delete-container p {
    font-size: 1.1rem;
    color: #555;
    margin-bottom: 2rem;
    line-height: 1.6;
    padding: 0 0.5rem;
}

.delete-container p strong {
    color: #d63031;
    font-weight: 700;
    font-size: 1.2rem;
    display: inline-block;
    position: relative;
    padding: 0.2rem 0.5rem;
}

.delete-container p strong::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #ff6b6b, #ee5a24);
    border-radius: 2px;
    animation: expandWidth 0.6s ease-out 0.3s both;
}

/* Button Group */
.btn-group {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
}

/* Button Styles */
.btn {
    padding: 0.8rem 2.5rem;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    position: relative;
    overflow: hidden;
}

/* Delete Button */
.btn-danger {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
}

.btn-danger::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.6s ease;
}

.btn-danger:hover::before {
    left: 100%;
}

.btn-danger:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
    background: linear-gradient(135deg, #ff5252, #d63031);
}

.btn-danger:active {
    transform: scale(0.95);
}

/* Cancel Button */
.btn-secondary {
    background: linear-gradient(135deg, #a29bfe, #6c5ce7);
    color: white;
    box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
}

.btn-secondary::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.6s ease;
}

.btn-secondary:hover::before {
    left: 100%;
}

.btn-secondary:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 30px rgba(108, 92, 231, 0.5);
    background: linear-gradient(135deg, #7c6cf0, #5a4bd1);
}

.btn-secondary:active {
    transform: scale(0.95);
}

/* Animations */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes shake {
    0%, 100% {
        transform: rotate(0deg);
    }
    10% {
        transform: rotate(-5deg);
    }
    20% {
        transform: rotate(5deg);
    }
    30% {
        transform: rotate(-5deg);
    }
    40% {
        transform: rotate(5deg);
    }
    50% {
        transform: rotate(-3deg);
    }
    60% {
        transform: rotate(3deg);
    }
    70% {
        transform: rotate(-2deg);
    }
    80% {
        transform: rotate(2deg);
    }
    90% {
        transform: rotate(-1deg);
    }
}

@keyframes pulse {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.2);
    }
}

@keyframes rotate {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

@keyframes expandWidth {
    from {
        width: 0;
        opacity: 0;
    }
    to {
        width: 100%;
        opacity: 1;
    }
}

/* Hover Effects for Form */
.delete-container:hover {
    box-shadow: 
        0 25px 70px rgba(0, 0, 0, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.2) inset;
    transform: translateY(-2px);
    transition: all 0.4s ease;
}

/* Additional hover effect for delete button with trash icon */
.btn-danger::after {
    content: '🗑️';
    font-size: 1.2rem;
    transition: transform 0.3s ease;
}

.btn-danger:hover::after {
    transform: rotate(-15deg) scale(1.2);
}

/* Cancel button icon */
.btn-secondary::after {
    content: '✖️';
    font-size: 1.2rem;
    transition: transform 0.3s ease;
}

.btn-secondary:hover::after {
    transform: rotate(90deg) scale(1.2);
}

/* Responsive Design */
@media (max-width: 768px) {
    .delete-container {
        margin: 1.5rem 1rem;
        padding: 1.5rem;
    }
    
    .delete-container h2 {
        font-size: 1.8rem;
    }
    
    .delete-container h2::before {
        font-size: 2rem;
    }
    
    .delete-container p {
        font-size: 1rem;
    }
    
    .btn {
        padding: 0.6rem 1.8rem;
        font-size: 0.9rem;
        width: 100%;
        justify-content: center;
    }
    
    .btn-group {
        flex-direction: column;
        gap: 0.8rem;
    }
}

@media (max-width: 480px) {
    .delete-container {
        padding: 1rem;
        margin: 1rem 0.5rem;
        border-radius: 15px;
    }
    
    .delete-container h2 {
        font-size: 1.5rem;
    }
    
    .btn {
        padding: 0.5rem 1.5rem;
        font-size: 0.85rem;
    }
}

/* Dark Mode Support (Optional) */
@media (prefers-color-scheme: dark) {
    .delete-container {
        background: rgba(30, 30, 40, 0.95);
        box-shadow: 
            0 20px 60px rgba(0, 0, 0, 0.5),
            0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    }
    
    .delete-container p {
        color: #bbb;
    }
    
    .delete-container p strong {
        color: #ff6b6b;
    }
}

/* Entrance Animation with Stagger */
.delete-container > * {
    animation: fadeInUp 0.5s ease-out both;
}

.delete-container h2 {
    animation-delay: 0.1s;
}

.delete-container p {
    animation-delay: 0.2s;
}

.btn-group {
    animation-delay: 0.3s;
}

/* Floating particles effect */
.delete-container::after {
    content: '';
    position: absolute;
    top: -20px;
    right: -20px;
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, rgba(255, 107, 107, 0.1), transparent 70%);
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
    z-index: 0;
}

@keyframes float {
    0%, 100% {
        transform: translate(0, 0) scale(1);
    }
    25% {
        transform: translate(-20px, 20px) scale(1.2);
    }
    50% {
        transform: translate(20px, -10px) scale(0.9);
    }
    75% {
        transform: translate(-10px, -20px) scale(1.1);
    }
}

</style>

{% extends 'main.html' %}

{% block content %}
<div class="delete-container">
    <h2>🗑️ Confirm Delete</h2>

    <p>
        Are you sure you want to delete
        <strong>{{ object.name }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="btn-group">
            <button type="submit" class="btn btn-danger">
                Yes, Delete
            </button>

            <a href="{% url 'destination_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}

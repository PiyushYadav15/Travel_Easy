{% extends 'main.html' %}
{% block content %}
<h2>Confirm Restore</h2>
<p>Are you sure you want to restore <strong>{{ object.name }}</strong>?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-primary">Yes, Restore</button>
  <a href="{% url 'destination_history' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
